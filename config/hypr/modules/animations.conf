# animations {
    

# }

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes
    workspace_wraparound = yes
    
    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    # Curves (refined for smoother acceleration/deceleration)
    bezier = easeOutQuint,   0.22, 1,    0.36, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = smooth,         0.25, 0.1,  0.25, 1
    bezier = snappy,         0.3,  0,    0.2,  1
    
    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    # Global baseline (slightly reduced)
    animation = global,        1, 3.5, smooth
    
    # Borders (subtle, fast)
    animation = border,        1, 2.5, smooth
    
    # Windows (core feel)
    animation = windows,       1, 3.2, easeOutQuint
    animation = windowsIn,     1, 3.0, easeOutQuint, popin 75%
    animation = windowsOut,    1, 2.0, easeInOutCubic, popin 75%
    
    # Fades (supporting, not dominating)
    animation = fadeIn,        1, 2.2, smooth
    animation = fadeOut,       1, 1.8, smooth
    animation = fade,          1, 2.8, smooth
    
    # Layers (panels, rofi, notifications)
    animation = layers,        1, 3.0, easeOutQuint
    animation = layersIn,      1, 2.8, easeOutQuint, fade
    animation = layersOut,     1, 2.0, easeInOutCubic, fade
    
    animation = fadeLayersIn,  1, 1.8, smooth
    animation = fadeLayersOut, 1, 1.5, smooth
    
    # Workspaces (should feel fast and responsive)
    animation = workspaces,    1, 2.2, snappy, fade
    animation = workspacesIn,  1, 2.0, snappy, fade
    animation = workspacesOut, 1, 2.0, snappy, fade
    
    # Zoom (keep responsive, not exaggerated)
    animation = zoomFactor,    1, 5.0, snappy
}