# COLOR VARIABLES
$cyan = rgba(0, 255, 255, 1.0)
$magenta = rgba(255, 0, 255, 1.0)
$yellow = rgba(255, 255, 0, 1.0)
# $bg_dark = rgba(10, 10, 15, 1.0)

# GENERAL SETTINGS
general {
    disable_loading_bar = true
    hide_cursor = true
}

# BACKGROUND
background {
    monitor =
    path = $HOME/.config/hypr/hyprlock/assets/blurred_wallpaper.png
    color = rgba(10, 10, 15, 1.0)
    
    # CRT Effect
    # blur_passes = 2
    contrast = 1.3
    brightness = 1.0
    # vibrancy = 2.0
    # noise = 0.05
}

# TIME (The "Glitch" Clock)
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%I:%M %p')"
    color = $cyan
    font_size = 50
    font_family = Fira Code Bold
    position = 0, 80
    halign = center
    valign = center

    # Neon Glow Effect
    shadow_passes = 2
    shadow_size = 7
    shadow_color = $cyan
    shadow_boost = 1.0
}

# INPUT FIELD (Visible only when typing)
input-field {
    monitor =
    size = 200, 35
    outline_thickness = 2
    
    # Glow Gradient Border
    outer_color = $magenta $cyan 45deg
    inner_color = rgba(0, 0, 0, 0.8)
    font_color = $yellow
    
    # The "Magic" setting
    fade_on_empty = true
    
    dots_size = 0.3
    dots_spacing = 0.3
    dots_center = true
    
    placeholder_text = <span foreground="##00ffff">Enter the password</span>
    hide_input = false
    
    position = 0, -20
    halign = center
    valign = center

    # Cyberpunk Feedback
    fail_color = $magenta
    fail_text = <i>Wrong password</i>
    check_color = $yellow
    capslock_color = $yellow
}